<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>バーコード・QRハイブリッド照合</title>
    <!-- QuaggaJS: カメラ起動用, jsQR: QR読み取り用 -->
    <script src="https://cloudflare.com"></script>
    <script src="https://jsdelivr.net"></script>
    <style>
        body { font-family: sans-serif; text-align: center; margin: 10px; background: #f0f0f0; }
        #interactive.viewport { width: 100%; max-width: 500px; height: 300px; margin: 0 auto; background: #000; position: relative; overflow: hidden; }
        #interactive.viewport video { width: 100%; height: 100%; object-fit: cover; }
        #qr-canvas { display: none; } /* 隠しCanvas */
        .scan-area-guide { position: absolute; top: 25%; left: 10%; width: 80%; height: 50%; border: 3px solid #00ff66; box-shadow: 0 0 0 400px rgba(0, 0, 0, 0.4); z-index: 10; pointer-events: none; }
        .result-box { margin: 10px 0; }
        .code-value { font-weight: bold; background: white; padding: 5px; margin: 5px; }
        #judge-message { font-size: 20px; font-weight: bold; margin: 10px; padding: 10px; }
        .match { background: #d4edda; color: #155724; }
        .mismatch { background: #f8d7da; color: #721c24; }
        button { padding: 10px; font-size: 16px; margin: 5px; }
    </style>
</head>
<body>
    <h3>バーコード・QR 2点照合</h3>
    <div id="interactive" class="viewport"><div class="scan-area-guide"></div></div>
    <canvas id="qr-canvas"></canvas>
    <div class="result-box">
        <div>1: <span id="code1" class="code-value">-</span></div>
        <div>2: <span id="code2" class="code-value">-</span></div>
    </div>
    <div id="judge-message">スキャン中...</div>
    <button id="reset-btn">リセット</button>

    <script>
        let code1 = null, code2 = null, isScanning = true;
        const qrCanvas = document.getElementById('qr-canvas');
        const qrCtx = qrCanvas.getContext('2d', { willReadFrequently: true });

        // 1. QuaggaJSで安定してカメラを起動
        Quagga.init({
            inputStream: { type: "LiveStream", constraints: { facingMode: "environment" }, target: '#interactive' },
            decoder: { readers: ["ean_reader", "code_128_reader"] }
        }, function(err) {
            if (err) return alert("カメラ起動失敗");
            Quagga.start();
            requestAnimationFrame(scanQRCodeLoop); // QR解析ループ開始
        });

        // 2. 映像フレームをjsQRで解析（ハイブリッド処理）
        function scanQRCodeLoop() {
            if (!isScanning) return requestAnimationFrame(scanQRCodeLoop);
            const video = document.querySelector('#interactive video');
            if (video && video.readyState === video.HAVE_ENOUGH_DATA) {
                qrCanvas.width = video.videoWidth; qrCanvas.height = video.videoHeight;
                qrCtx.drawImage(video, 0, 0);
                const imageData = qrCtx.getImageData(0, 0, qrCanvas.width, qrCanvas.height);
                const qrCode = jsQR(imageData.data, imageData.width, imageData.height);
                if (qrCode) processCode(qrCode.data);
            }
            requestAnimationFrame(scanQRCodeLoop);
        }

        // 3. Quaggaでのバーコード検知
        Quagga.onDetected(result => { if (isScanning) processCode(result.codeResult.code); });

        // 4. 共通の確定処理
        function processCode(code) {
            if (!code || code1 === code || code2 === code) return;
            if (!code1) { code1 = code; document.getElementById('code1').innerText = code; }
            else if (!code2) { code2 = code; document.getElementById('code2').innerText = code; checkMatch(); }
        }

        function checkMatch() {
            isScanning = false;
            const msg = document.getElementById('judge-message');
            if (code1 === code2) { msg.innerText = "一致 (OK)"; msg.className = "match"; }
            else { msg.innerText = "不一致 (NG)"; msg.className = "mismatch"; }
        }

        document.getElementById('reset-btn').addEventListener('click', () => {
            code1 = null; code2 = null; isScanning = true;
            document.getElementById('code1').innerText = "-";
            document.getElementById('code2').innerText = "-";
            document.getElementById('judge-message').innerText = "スキャン中...";
            document.getElementById('judge-message').className = "";
        });
    </script>
</body>
</html>
