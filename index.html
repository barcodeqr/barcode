<!doctype html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QRコード照合システム</title>
    <!-- jsQRのCDN -->
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsqr.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; margin: 20px; background: #f0f0f0; }
        #start-audio-btn { background: #ffcc00; color: #333; font-weight: bold; border: 2px solid #ff9900; padding: 15px 30px; font-size: 18px; margin-bottom: 15px; animation: pulse 1.5s infinite; cursor: pointer; border-radius: 5px; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }
        
        #interactive.viewport { width: 100%; max-width: 500px; height: 300px; margin: 0 auto; background: #000; position: relative; overflow: hidden; }
        #interactive.viewport video { width: 100%; height: 100%; object-fit: cover; }
        #qr-canvas { display: none; }
        
        .scan-area-guide { position: absolute; top: 25%; left: 10%; width: 80%; height: 50%; border: 3px solid #00ff66; box-sizing: border-box; box-shadow: 0 0 0 400px rgba(0, 0, 0, 0.4); border-radius: 8px; z-index: 10; pointer-events: none; }
        .scan-area-guide::after { content: ''; position: absolute; left: 0; top: 50%; width: 100%; height: 2px; background: #00ff66; box-shadow: 0 0 8px #00ff66; animation: scanRadar 2s linear infinite; }
        @keyframes scanRadar { 0% { top: 0%; } 50% { top: 100%; } 100% { top: 0%; } }
        
        .data-display { margin: 20px auto; max-width: 500px; background: #fff; padding: 15px; border-radius: 8px; text-align: left; }
        .data-row { margin: 10px 0; font-size: 18px; }
        .code-val { font-weight: bold; color: #333; margin-left: 10px; word-break: break-all; }
        
        #judge-message { font-size: 24px; font-weight: bold; text-align: center; margin: 15px 0; padding: 10px; border-radius: 5px; background: #eee; }
        .match { background: #d4edda !important; color: #155724; }
        .mismatch { background: #f8d7da !important; color: #721c24; }
        
        #reset-btn { background: #666; color: #fff; border: none; padding: 10px 20px; font-size: 16px; cursor: pointer; border-radius: 4px; width: 100%; }
    </style>
</head>
<body>

    <h1>QRコード照合システム</h1>
    <button id="start-audio-btn">システムを開始する</button>

    <div id="interactive" class="viewport">
        <video id="webcam-video" playsinline></video>
        <div class="scan-area-guide"></div>
    </div>

    <canvas id="qr-canvas"></canvas>

    <div class="data-display">
        <div class="data-row">1つ目: <span id="code1" class="code-val">-</span></div>
        <div class="data-row">2つ目: <span id="code2" class="code-val">-</span></div>
        <div id="judge-message">確認中...</div>
        <button id="reset-btn">リセット</button>
    </div>

    <script>
        // --- 画面要素の取得 ---
        const video = document.getElementById('webcam-video');
        const canvas = document.getElementById('qr-canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const audioBtn = document.getElementById('start-audio-btn');

        // --- 状態管理変数 ---
        let code1 = null;
        let code2 = null;
        let isScanning = true;
        let detectionBuffer = [];
        const REQUIRED_CONSISTENT_READS = 3; // 3回連続一致で確定

        // --- ダミーの音声オブジェクト（実際のファイルがない場合のエラー防止） ---
        const audioScan1 = new Audio('scan1.mp3');
        const audioScan2 = new Audio('scan2.mp3');
        const audioMatch = new Audio('match.mp3');
        const audioMismatch = new Audio('mismatch.mp3');

        function playSound(audio) {
            if (!audio) return;
            audio.currentTime = 0;
            audio.play().catch(err => console.log("音声再生が制限されました（ファイル不在など）:", err.message));
        }

        // --- カメラ起動制御 ---
        audioBtn.addEventListener('click', () => {
            audioBtn.style.display = 'none';
            startCamera();
        });

        function startCamera() {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
                .then((stream) => {
                    video.srcObject = stream;
                    video.play();
                    requestAnimationFrame(tick);
                })
                .catch((err) => {
                    alert("カメラの起動に失敗しました。権限を許可してください。");
                    console.error(err);
                });
        }

        // --- リアルタイム画像解析（ここが未結合だったため読み込みませんでした） ---
        function tick() {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                canvas.height = video.videoHeight;
                canvas.width = video.videoWidth;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                // スキャン有効フラグが true の時のみ、jsQRで解析を行う
                if (isScanning) {
                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const code = jsQR(imageData.data, imageData.width, imageData.height, {
                        inversionAttempts: "dontInvert",
                    });

                    // QRコードが視界に入ったら、ロジック関数へデータを渡す
                    if (code && code.data) {
                        handleDetected(code.data);
                    }
                }
            }
            requestAnimationFrame(tick); // ループは常に回し続ける
        }

        // --- ご提示いただいたバリデーションと登録ロジック ---
        function handleDetected(confirmedCode) {
            detectionBuffer.push(confirmedCode);
            
            if (detectionBuffer.length < REQUIRED_CONSISTENT_READS) return;

            const allMatch = detectionBuffer.every(val => val === confirmedCode);
            if (!allMatch) {
                detectionBuffer.shift();
                return;
            }

            // 確定したのでバッファクリア
            detectionBuffer = [];

            if (!code1) {
                code1 = confirmedCode;
                document.getElementById('code1').innerText = confirmedCode;
                playSound(audioScan1);
                isScanning = false;
                
                // 1つ目を読んだ後、2秒間スキャンを停止（同じQRの即時連続誤読防止）
                setTimeout(() => { 
                    if (!code2) isScanning = true; 
                }, 2000); 
            } else if (!code2) {
                code2 = confirmedCode;
                document.getElementById('code2').innerText = confirmedCode;
                isScanning = false;
                playSound(audioScan2);

                let hasJudged = false;
                function triggerCheck() {
                    if (hasJudged) return;
                    hasJudged = true;
                    checkMatch();
                }

                audioScan2.onended = triggerCheck;
                setTimeout(triggerCheck, 450);
            }
        }

        // 照合判定
        function checkMatch() {
            const judgeMsg = document.getElementById('judge-message');
            if (code1 === code2) {
                judgeMsg.innerText = "一致 (OK)";
                judgeMsg.className = "match";
                playSound(audioMatch);
            } else {
                judgeMsg.innerText = "不一致 (NG)";
                judgeMsg.className = "mismatch";
                playSound(audioMismatch);
            }
            // 注: 判定終了後はスキャンが false のまま停止します。リセットボタンで再開します。
        }

        // リセット
        document.getElementById('reset-btn').addEventListener('click', function() {
            code1 = null;
            code2 = null;
            isScanning = true;
            detectionBuffer = [];
            
            document.getElementById('code1').innerText = "-";
            document.getElementById('code2').innerText = "-";
            
            const judgeMsg = document.getElementById('judge-message');
            judgeMsg.innerText = "確認中...";
            judgeMsg.className = "";
        });
    </script>
</body>
</html>
